<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Specific-Topic Quiz Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .quiz-option.selected {
            border-color: #22d3ee; /* cyan-400 */
            background-color: #334155; /* slate-700 */
        }
        .quiz-option:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #22d3ee; /* cyan-400 */
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <meta http-equiv="origin-trial" content="">
    <!-- Note: WebGPU must be available/enabled in the browser for the model to run. -->
  </head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen p-4">

    <div id="quiz-container" class="w-full max-w-3xl mx-auto">
        
        <!-- Start Screen -->
        <div id="start-screen" class="text-center bg-gray-800 p-8 rounded-2xl shadow-2xl">
            <h1 class="text-4xl font-bold mb-2 text-cyan-400">AI Assessment Quiz</h1>
            <p class="text-gray-300 mb-6 text-lg">Select a specific topic to begin.</p>
            
            <div class="mb-6">
                <select id="topic-select" class="w-full p-3 bg-gray-700 text-white rounded-lg border-2 border-gray-600 focus:border-cyan-500 focus:ring-cyan-500 focus:outline-none">
                    <option value="">-- Select a Topic --</option>
                </select>
            </div>
            
            <button id="start-btn" class="w-full bg-gray-600 text-white font-bold py-3 px-6 rounded-lg text-xl transition-colors duration-300 flex items-center justify-center gap-3 cursor-not-allowed" disabled>
                <span id="start-btn-text">Loading AI Model...</span>
                <div id="loading-spinner" class="spinner"></div>
            </button>
            <p id="error-message" class="text-red-400 mt-4 h-5"></p>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="hidden bg-gray-800 p-8 rounded-2xl shadow-2xl">
            <div class="mb-6 flex justify-between items-center">
                <h2 class="text-2xl font-bold text-cyan-400" id="question-number"></h2>
                <div id="quiz-topic" class="text-lg font-semibold bg-gray-700 px-4 py-2 rounded-lg"></div>
            </div>
            <p class="text-xl mb-6 min-h-[6rem]" id="question-text"></p>
            <div id="options-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            <button id="next-btn" class="w-full mt-8 bg-gray-600 cursor-not-allowed text-white font-bold py-3 px-6 rounded-lg text-lg transition duration-300" disabled>
                Next Question
            </button>
        </div>

        <!-- Results Screen -->
        <div id="results-screen" class="hidden text-center bg-gray-800 p-8 rounded-2xl shadow-2xl">
            <h1 class="text-4xl font-bold mb-2 text-cyan-400">Quiz Complete!</h1>
            <p class="text-gray-300 mb-2 text-2xl">Your Final Score:</p>
            <p class="text-5xl font-extrabold mb-8" id="final-score"></p>
            
            <div id="results-review-container" class="text-left space-y-6 max-h-[50vh] overflow-y-auto p-4 bg-gray-900 rounded-lg"></div>

            <button id="restart-btn" class="w-full mt-8 bg-cyan-600 hover:bg-cyan-700 text-white font-bold py-3 px-6 rounded-lg text-xl transition-transform transform hover:scale-105 shadow-lg">
                Choose Another Topic
            </button>
        </div>
    </div>

<script type="module">
  import * as webllm from "https://esm.run/@mlc-ai/web-llm";

  document.addEventListener('DOMContentLoaded', () => {
    // --- DOM Elements ---
    const startScreen = document.getElementById('start-screen');
    const quizScreen = document.getElementById('quiz-screen');
    const resultsScreen = document.getElementById('results-screen');
    const topicSelect = document.getElementById('topic-select');
    const startBtn = document.getElementById('start-btn');
    const startBtnText = document.getElementById('start-btn-text');
    const loadingSpinner = document.getElementById('loading-spinner');
    const errorMessageEl = document.getElementById('error-message');
    const quizTopicEl = document.getElementById('quiz-topic');
    const questionNumberEl = document.getElementById('question-number');
    const questionTextEl = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const nextBtn = document.getElementById('next-btn');
    const finalScoreEl = document.getElementById('final-score');
    const resultsReviewContainer = document.getElementById('results-review-container');
    const restartBtn = document.getElementById('restart-btn');

    // --- State ---
    let generatedQuestions = [];
    let userAnswers = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let selectedTopic = "";
    let isEngineReady = false;
    const TOTAL_QUESTIONS = 10;

    // --- Constants ---
    const topics = [
      "Definition of a Function", "Domain and Range", "Function Notation", "Plotting Functions",
      "Intercepts (x- and y-)", "Symmetry (Even, Odd Functions)", "Vertical and Horizontal Shifts",
      "Stretching and Compressing", "Reflections", "Vertical Asymptotes", "Horizontal/Oblique Asymptotes",
      "End Behavior of Functions", "Zeros and Asymptotes", "Graphing Rational Functions",
      "Applications in Real-World Problems", "Properties and Graphs", "Exponential Growth and Decay",
      "Compound Interest Applications", "Properties of Logarithms", "Change of Base Formula",
      "Graphs of Logarithmic Functions", "Exponential Equations", "Logarithmic Equations",
      "Applications in Finance and Science", "Ratios, Proportions, Percentages", "Profit, Loss, and Discounts",
      "Simple Interest – Formula and Applications", "Ordinary vs. Exact Interest", "Compounding Frequency",
      "Effective Rate of Interest", "Future Value of Annuities", "Present Value of Annuities",
      "Installment Buying", "Loan Schedules", "Credit Card Computations", "Propositions",
      "Negation, Conjunction, Disjunction", "Conditional (If–Then)", "Biconditional (If and Only If)",
      "Constructing Truth Tables", "Testing Logical Equivalence"
    ];

    // --- WebLLM Engine ---
    let engine = null;

    async function initEngine() {
      try {
        setStartButtonBusy(true, "Loading AI Model...");
        const worker = new Worker("https://esm.run/@mlc-ai/web-llm/worker", { type: "module" });
        engine = await webllm.CreateWebWorkerMLCEngine(worker, {
          model: "Phi-3-mini-4k-instruct-q4f16_1-MLC"
        });
        isEngineReady = true;
        errorMessageEl.textContent = "";
      } catch (err) {
        console.error("Failed to init AI:", err);
        errorMessageEl.textContent = "AI model failed to load (requires WebGPU-enabled browser).";
      } finally {
        setStartButtonBusy(false, selectedTopic ? "Start Quiz" : "Select a Topic to Start");
        updateStartButtonEnabled();
      }
    }

    // --- Helpers ---
    function updateStartButtonEnabled() {
      const canStart = Boolean(selectedTopic) && isEngineReady;
      startBtn.disabled = !canStart;
      startBtn.classList.toggle("cursor-not-allowed", !canStart);
      startBtn.classList.toggle("bg-gray-600", !canStart);
      startBtn.classList.toggle("bg-cyan-600", canStart);
      startBtnText.textContent = canStart ? "Start Quiz" : (isEngineReady ? "Select a Topic to Start" : "Loading AI Model...");
    }

    function setStartButtonBusy(isBusy, textWhenBusy) {
      startBtn.disabled = isBusy || !(Boolean(selectedTopic) && isEngineReady);
      startBtnText.textContent = isBusy ? textWhenBusy : (Boolean(selectedTopic) && isEngineReady ? "Start Quiz" : (isEngineReady ? "Select a Topic to Start" : "Loading AI Model..."));
      loadingSpinner.classList.toggle("hidden", !isBusy);
    }

    function safeJsonArrayFromText(text) {
      if (!text) throw new Error("Empty response content");
      // Strip fenced code blocks first
      let cleaned = text.replace(/^```json\s*/i, "").replace(/^```\s*/i, "").replace(/```\s*$/i, "").trim();
      // If still not a JSON array, try to extract first [...] block
      if (!(cleaned.trim().startsWith("[") && cleaned.trim().endsWith("]"))) {
        const firstBracket = cleaned.indexOf("[");
        const lastBracket = cleaned.lastIndexOf("]");
        if (firstBracket !== -1 && lastBracket !== -1 && lastBracket > firstBracket) {
          cleaned = cleaned.slice(firstBracket, lastBracket + 1);
        }
      }
      return JSON.parse(cleaned);
    }

    function letterToIndex(letter) {
      if (!letter) return null;
      const normalized = String(letter).trim().toUpperCase();
      if (normalized.length === 1 && normalized >= 'A' && normalized <= 'Z') {
        return normalized.charCodeAt(0) - 'A'.charCodeAt(0);
      }
      const maybeNum = parseInt(normalized, 10);
      return Number.isFinite(maybeNum) ? maybeNum : null;
    }

    function normalizeQuizData(rawItems) {
      const normalized = [];
      for (const item of rawItems) {
        const question = (item.question ?? item.prompt ?? "").toString().trim();
        const options = Array.isArray(item.options ?? item.choices) ? (item.options ?? item.choices).map(o => o.toString()) : [];
        let answerRaw = (item.answer ?? item.correct ?? item.correct_answer ?? item.solution);

        if (!question || options.length < 2) continue;

        // Determine correct index from various answer formats
        let correctIndex = null;
        if (typeof answerRaw === 'number') {
          correctIndex = answerRaw;
        } else if (typeof answerRaw === 'string') {
          // Try letter mapping first
          const letterIndex = letterToIndex(answerRaw);
          if (letterIndex !== null) correctIndex = letterIndex;
          if (correctIndex === null) {
            // Try to match option text
            const idx = options.findIndex(opt => opt.trim().toLowerCase() === answerRaw.trim().toLowerCase());
            if (idx !== -1) correctIndex = idx;
          }
        }

        // Clamp/fallback
        if (!Number.isFinite(correctIndex) || correctIndex < 0 || correctIndex >= options.length) {
          correctIndex = 0;
        }

        normalized.push({ question, options, correctIndex });
      }
      return normalized;
    }

    // --- Quiz Generation ---
    async function generateQuiz() {
      if (!selectedTopic || !isEngineReady || !engine) return;
      setStartButtonBusy(true, "Generating Quiz...");
      errorMessageEl.textContent = "";

      const prompt = `Create a ${TOTAL_QUESTIONS}-question multiple-choice quiz about "${selectedTopic}".\n` +
        `Return JSON only, in this exact format (no extra text):\n` +
        `[{"question":"...","options":["A","B","C","D"],"answer":"B"}, ...]`;

      try {
        const response = await engine.chat.completions.create({
          messages: [
            { role: "system", content: "You are a quiz generator that outputs only JSON." },
            { role: "user", content: prompt }
          ],
          temperature: 0.7,
          max_tokens: 1500
        });

        const content = response?.choices?.[0]?.message?.content;
        if (typeof content !== 'string') throw new Error("Unexpected AI response shape");

        const quizRaw = safeJsonArrayFromText(content);
        if (!Array.isArray(quizRaw) || quizRaw.length === 0) throw new Error("Empty quiz JSON");

        const normalized = normalizeQuizData(quizRaw).slice(0, TOTAL_QUESTIONS);
        if (!Array.isArray(normalized) || normalized.length === 0) throw new Error("No valid questions found");

        generatedQuestions = normalized;
        startQuiz();
      } catch (err) {
        console.error("Quiz generation error:", err);
        errorMessageEl.textContent = "Failed to generate quiz. Try again.";
      } finally {
        setStartButtonBusy(false, selectedTopic ? "Start Quiz" : "Select a Topic to Start");
        updateStartButtonEnabled();
      }
    }

    // --- UI ---
    function initializeApp() {
      topics.forEach(topic => {
        const option = document.createElement("option");
        option.value = topic;
        option.textContent = topic;
        topicSelect.appendChild(option);
      });

      topicSelect.addEventListener("change", handleTopicSelection);
      startBtn.addEventListener("click", generateQuiz);
      nextBtn.addEventListener("click", handleNextQuestion);
      restartBtn.addEventListener("click", resetToStartScreen);

      initEngine();
    }

    function handleTopicSelection() {
      selectedTopic = topicSelect.value;
      updateStartButtonEnabled();
    }

    function startQuiz() {
      currentQuestionIndex = 0;
      score = 0;
      userAnswers = [];
      startScreen.classList.add("hidden");
      quizScreen.classList.remove("hidden");
      resultsScreen.classList.add("hidden");
      quizTopicEl.textContent = selectedTopic;
      showQuestion();
    }

    function showQuestion() {
      resetState();
      const currentQuestion = generatedQuestions[currentQuestionIndex];
      questionNumberEl.textContent = `Question ${currentQuestionIndex + 1} / ${generatedQuestions.length}`;
      questionTextEl.textContent = currentQuestion.question;

      currentQuestion.options.forEach((optionText, idx) => {
        const button = document.createElement("button");
        button.textContent = optionText;
        button.classList.add(
          "quiz-option", "w-full", "p-4", "text-left",
          "bg-gray-700", "rounded-lg", "border-2", "border-transparent",
          "hover:border-cyan-500", "transition", "duration-200"
        );
        button.addEventListener("click", (e) => selectAnswer(e, idx));
        optionsContainer.appendChild(button);
      });
    }

    function resetState() {
      nextBtn.disabled = true;
      nextBtn.classList.add("cursor-not-allowed", "bg-gray-600");
      nextBtn.classList.remove("bg-cyan-600");
      optionsContainer.innerHTML = "";
    }

    function selectAnswer(event, selectedIndex) {
      userAnswers[currentQuestionIndex] = selectedIndex;
      Array.from(optionsContainer.children).forEach(button => {
        button.disabled = true;
        if (button === event.target) button.classList.add("selected");
      });
      nextBtn.disabled = false;
      nextBtn.classList.remove("cursor-not-allowed", "bg-gray-600");
      nextBtn.classList.add("bg-cyan-600");
    }

    function handleNextQuestion() {
      if (nextBtn.disabled) return;
      currentQuestionIndex++;
      if (currentQuestionIndex < generatedQuestions.length) {
        showQuestion();
      } else {
        showResults();
      }
    }

    function showResults() {
      quizScreen.classList.add("hidden");
      resultsScreen.classList.remove("hidden");

      score = 0;
      userAnswers.forEach((answerIdx, index) => {
        if (answerIdx === generatedQuestions[index].correctIndex) score++;
      });

      const percentage = Math.round((score / generatedQuestions.length) * 100);
      finalScoreEl.textContent = `${score} / ${generatedQuestions.length} (${percentage}%)`;

      resultsReviewContainer.innerHTML = "";
      generatedQuestions.forEach((q, index) => {
        const userIdx = userAnswers[index];
        const correct = userIdx === q.correctIndex;
        const userAnswerText = Number.isFinite(userIdx) ? q.options[userIdx] : "Not answered";
        const correctAnswerText = q.options[q.correctIndex];
        const reviewEl = document.createElement("div");
        reviewEl.className = "p-4 border-b border-gray-700";
        reviewEl.innerHTML = `
          <p class="font-semibold text-gray-300">Q${index + 1}: ${q.question}</p>
          ${
            correct
              ? `<p class="mt-2">Your answer: <span class="text-green-400">${userAnswerText} ✔</span></p>`
              : `<p class="mt-2">Your answer: <span class="text-red-400">${userAnswerText} ✘</span></p>
                 <p class="mt-1">Correct answer: <span class="text-green-400">${correctAnswerText}</span></p>`
          }
        `;
        resultsReviewContainer.appendChild(reviewEl);
      });
    }

    function resetToStartScreen() {
      resultsScreen.classList.add("hidden");
      startScreen.classList.remove("hidden");
      topicSelect.value = "";
      handleTopicSelection();
      errorMessageEl.textContent = "";
    }

    // Initialize app
    initializeApp();
  });
</script>

</body>
</html>
